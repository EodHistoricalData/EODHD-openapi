        variants:
          - name: "Market Cap — AAPL.US"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              from: "2024-01-01"
              fmt: "json"
          - name: "Market Cap — MSFT.US"
            path_params:
              ticker: "MSFT.US"
            query_overrides:
              fmt: "json"

