    description: >
      Quick asset discovery by ticker code, company name, or ISIN across stocks, ETFs, mutual funds,
      bonds, and indices. Smart ranking returns the most relevant results first.

      **Plans:** Free, All-In-One, EOD Historical Data, EOD+Intraday, Fundamentals Data Feed.
      **Cost:** 1 API call per request. Max 500 results.
      **Docs:** https://eodhd.com/financial-apis/search-api-for-stocks-etfs-mutual-funds/
    endpoints:
      - path: "/search/{query}"
        variants:
          - name: "Search — Apple"
            path_params:
              query: "apple"
            query_overrides:
              fmt: "json"
          - name: "Search — ISIN"
            path_params:
              query: "US0378331005"
            query_overrides:
              fmt: "json"
          - name: "Search — AAPL (limited)"
            path_params:
              query: "AAPL"
            query_overrides:
              fmt: "json"
              limit: "5"

