      and contract details with 2+ years of historical depth. 43 data fields per contract.

      **This is a Marketplace product — requires a separate subscription.**
      **Pricing:** Standard from €29.99/month (promotional).
      **Not included in standard EODHD plans (All-In-One, EOD, Fundamentals).**
      **Docs:** https://eodhd.com/financial-apis/options-data-api-us-stocks/
    endpoints:
      - path: "/options/{symbol}"
        variants:
          - name: "Options Chain — AAPL.US"
            path_params:
              symbol: "AAPL.US"
            query_overrides:
              fmt: "json"
          - name: "Options Chain — AAPL.US (date filtered)"
            path_params:
              symbol: "AAPL.US"
            query_overrides:
