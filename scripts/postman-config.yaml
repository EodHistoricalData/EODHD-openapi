# Postman Collection Folder Config
# Maps OpenAPI endpoints → Postman folders with request variants.
# Grouping matches https://eodhd.com/financial-apis/ documentation structure.

collection:
  _postman_id: "963a320c-db6e-4629-96fe-adf9dac8e14d"
  name: "EODHD Documentation"
  description: >
    Complete documentation for the EODHD Financial Data API — 150,000+ tickers across 70+ exchanges.

    All endpoints use `{{api_url}}` as the base URL and `{{api_token}}` for authentication.
    Get your free API key at https://eodhd.com/register

    Full documentation: https://eodhd.com/financial-apis/
    Pricing & plans: https://eodhd.com/pricing

variables:
  api_url: "https://eodhd.com/api"
  api_token: "demo"

# ============================================================
# FOLDER ORDER FOLLOWS WP DOCUMENTATION STRUCTURE
# ============================================================

folders:

  # ──────────────────────────────────────────────
  # MARKET DATA APIs
  # ──────────────────────────────────────────────

  - name: "End-Of-Day Historical Data"
    description: >
      Historical daily OHLCV price data for stocks, ETFs, bonds, and indices across 70+ exchanges.
      Covers 150,000+ tickers worldwide with US stocks dating back to 1972.
      Supports daily, weekly, and monthly periods with split and dividend adjustments.

      **Plans:** Free (1 year history), All-In-One, EOD Historical Data, EOD+Intraday.
      **Cost:** 1 API call per request.
      **Docs:** https://eodhd.com/financial-apis/api-for-historical-data-and-volumes/
    endpoints:
      - path: "/eod/{ticker}"
        variants:
          - name: "EOD Data — AAPL.US (daily)"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              fmt: "json"
              from: "2024-01-01"
              to: "2024-12-31"
              period: "d"
          - name: "EOD Data — MSFT.US (weekly)"
            path_params:
              ticker: "MSFT.US"
            query_overrides:
              fmt: "json"
              from: "2024-01-01"
              period: "w"

  - name: "Live (Delayed) Stock Prices"
    description: >
      Delayed OHLCV stock price snapshots with 15–20 minute latency for global stocks
      and ~1 minute delay for 1,100+ forex pairs.
      Supports single and multi-ticker requests (up to 15–20 tickers per call).

      **Plans:** Free (20 calls/day, demo tickers only), All-In-One, EOD Historical Data, EOD+Intraday.
      **Cost:** 1 API call per request.
      **Docs:** https://eodhd.com/financial-apis/live-realtime-stocks-api/
    endpoints:
      - path: "/real-time/{ticker}"
        variants:
          - name: "Real-Time Price — AAPL.US"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              fmt: "json"
          - name: "Real-Time Price — Multiple Tickers"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              fmt: "json"
              s: "VTI,EUR.FOREX"
      - path: "/us-quote-delayed"
        variants:
          - name: "US Delayed Quotes — AAPL, MSFT, GOOGL"
            query_overrides:
              s: "AAPL,MSFT,GOOGL"
              fmt: "json"
          - name: "US Delayed Quotes — Single Ticker"
            query_overrides:
              s: "TSLA"
              fmt: "json"

  - name: "Real-Time Data via WebSockets"
    description: >
      Streaming real-time market data over persistent WebSocket connections.
      Four channels: US Trades, US Quotes, Forex, and Crypto.
      Transport latency under 50ms. Does not consume REST API calls (separate billing).


      **WebSocket URLs:**

      - US Trades: `wss://ws.eodhistoricaldata.com/ws/us?api_token=YOUR_KEY`

      - US Quotes: `wss://ws.eodhistoricaldata.com/ws/us-quote?api_token=YOUR_KEY`

      - Forex: `wss://ws.eodhistoricaldata.com/ws/forex?api_token=YOUR_KEY`

      - Crypto: `wss://ws.eodhistoricaldata.com/ws/crypto?api_token=YOUR_KEY`


      **Subscribe:** `{"action": "subscribe", "symbols": "AAPL,TSLA"}`

      **Unsubscribe:** `{"action": "unsubscribe", "symbols": "AAPL"}`

      **Limit:** 50 concurrent subscriptions per connection (upgradeable via dashboard).

      **Demo tickers (free):** AAPL, MSFT, TSLA, EURUSD, ETH-USD, BTC-USD.


      **Plans:** All-In-One, EOD+Intraday — All World Extended.

      **Cost:** Does NOT consume API calls.

      **Docs:** https://eodhd.com/financial-apis/new-real-time-data-api-websockets
    manual_items:
      - name: "WebSocket — US Trades (example)"
        method: "GET"
        url: "wss://ws.eodhistoricaldata.com/ws/us?api_token={{api_token}}"
        description: >
          **This is a WebSocket endpoint — use Postman's WebSocket tab or a WS client to connect.**


          Connect to `wss://ws.eodhistoricaldata.com/ws/us?api_token=YOUR_KEY`

          Then send: `{"action": "subscribe", "symbols": "AAPL,TSLA"}`


          **Response fields:** `s` (ticker), `p` (price), `v` (volume), `c` (condition), `dp` (dark pool), `ms` (market status), `t` (timestamp ms).
        examples:
          - name: "US Trade message"
            body: '{"s":"AAPL","p":227.31,"v":100,"c":12,"dp":false,"ms":"open","t":1725198451165}'
      - name: "WebSocket — US Quotes (example)"
        method: "GET"
        url: "wss://ws.eodhistoricaldata.com/ws/us-quote?api_token={{api_token}}"
        description: >
          **This is a WebSocket endpoint — use Postman's WebSocket tab or a WS client to connect.**


          Connect to `wss://ws.eodhistoricaldata.com/ws/us-quote?api_token=YOUR_KEY`

          Then send: `{"action": "subscribe", "symbols": "AAPL"}`


          **Response fields:** `s` (ticker), `ap` (ask price), `as` (ask size), `bp` (bid price), `bs` (bid size), `t` (timestamp ms).
        examples:
          - name: "US Quote message"
            body: '{"s":"AAPL","ap":227.33,"as":200,"bp":227.30,"bs":100,"t":1725198451165}'
      - name: "WebSocket — Forex (example)"
        method: "GET"
        url: "wss://ws.eodhistoricaldata.com/ws/forex?api_token={{api_token}}"
        description: >
          **This is a WebSocket endpoint — use Postman's WebSocket tab or a WS client to connect.**


          Connect to `wss://ws.eodhistoricaldata.com/ws/forex?api_token=YOUR_KEY`

          Then send: `{"action": "subscribe", "symbols": "EURUSD"}`


          **Response fields:** `s` (symbol), `a` (ask), `b` (bid), `dc` (daily change %), `dd` (daily diff), `ppms` (market status), `t` (timestamp ms).
        examples:
          - name: "Forex message"
            body: '{"s":"EURUSD","a":1.08675,"b":1.08665,"dc":0.21,"dd":0.0023,"ppms":false,"t":1725198451165}'
      - name: "WebSocket — Crypto (example)"
        method: "GET"
        url: "wss://ws.eodhistoricaldata.com/ws/crypto?api_token={{api_token}}"
        description: >
          **This is a WebSocket endpoint — use Postman's WebSocket tab or a WS client to connect.**


          Connect to `wss://ws.eodhistoricaldata.com/ws/crypto?api_token=YOUR_KEY`

          Then send: `{"action": "subscribe", "symbols": "BTC-USD,ETH-USD"}`


          **Response fields:** `s` (symbol), `p` (price), `q` (quantity), `dc` (daily change %), `dd` (daily diff), `t` (timestamp ms).
        examples:
          - name: "Crypto message"
            body: '{"s":"ETH-USD","p":2874.12,"q":0.145,"dc":-0.54,"dd":-15.61,"t":1725198451165}'

  - name: "Intraday Historical Data"
    description: >
      Intraday stock price data at 1-minute, 5-minute, and hourly intervals for major exchanges.
      Historical coverage back to 2004 for US stocks. Supports pre-market and after-hours data.

      **Plans:** EOD+Intraday — All World Extended, All-In-One.
      **Cost:** 5 API calls per request.
      **Docs:** https://eodhd.com/financial-apis/intraday-historical-data-api/
    endpoints:
      - path: "/intraday/{ticker}"
        variants:
          - name: "Intraday — AAPL.US (5-min)"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              interval: "5m"
              fmt: "json"
          - name: "Intraday — AAPL.US (1-hour)"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              interval: "1h"
              fmt: "json"

  - name: "Tick Data: US Stock Market"
    description: >
      Granular tick-level transaction data for ~80,000 US equity tickers across all US exchanges.
      Historical data spans back to January 2008, updated daily.

      **Plans:** All-In-One (add-on packages available for other plans via support).
      **Cost:** 10 API calls per request.
      **Docs:** https://eodhd.com/financial-apis/us-stock-market-tick-data-api/
    endpoints:
      - path: "/ticks"
        variants:
          - name: "Tick Data — AAPL"
            query_overrides:
              s: "AAPL"
              fmt: "json"

  - name: "Bulk API for EOD, Splits and Dividends"
    description: >
      Bulk download end-of-day data, stock splits, and dividends for entire exchanges in a single request.
      Eliminates the need for thousands of individual API calls. Supports date filtering and extended dataset
      with company metadata.

      **Plans:** All-In-One, EOD Historical Data, EOD+Intraday.
      **Cost:** 100 API calls per full exchange request; 1 per ticker with symbol filtering.
      **Docs:** https://eodhd.com/financial-apis/bulk-api-eod-splits-dividends/
    endpoints:
      - path: "/eod-bulk-last-day/{exchange}"
        variants:
          - name: "Bulk EOD — US Exchange (last day)"
            path_params:
              exchange: "US"
            query_overrides:
              fmt: "json"
              type: "eod"
          - name: "Bulk EOD — US Exchange (specific date)"
            path_params:
              exchange: "US"
            query_overrides:
              fmt: "json"
              type: "eod"
              date: "2024-01-15"
          - name: "Bulk EOD — Filtered Symbols (extended)"
            path_params:
              exchange: "US"
            query_overrides:
              fmt: "json"
              type: "eod"
              symbols: "AAPL,MSFT,GOOGL"
              filter: "extended"
          - name: "Bulk Splits — US Exchange"
            path_params:
              exchange: "US"
            query_overrides:
              fmt: "json"
              type: "splits"
          - name: "Bulk Dividends — US Exchange"
            path_params:
              exchange: "US"
            query_overrides:
              fmt: "json"
              type: "dividends"

  - name: "Corporate Actions: Splits and Dividends"
    description: >
      Historical dividend and stock split data with 30+ years of records for paid subscribers.
      Covers all supported exchanges worldwide.

      **Plans:** Free (1 year history), All-In-One, EOD Historical Data, EOD+Intraday.
      **Cost:** 1 API call per request.
      **Docs:** https://eodhd.com/financial-apis/api-splits-dividends/
    endpoints:
      - path: "/div/{ticker}"
        variants:
          - name: "Dividends — AAPL.US"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              fmt: "json"
              from: "2020-01-01"
          - name: "Dividends — MSFT.US"
            path_params:
              ticker: "MSFT.US"
            query_overrides:
              fmt: "json"
      - path: "/splits/{ticker}"
        variants:
          - name: "Splits — AAPL.US"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              fmt: "json"

  - name: "Technical Indicators"
    description: >
      100+ technical analysis indicators for stocks, crypto, and forex — moving averages (SMA, EMA, WMA),
      oscillators (RSI, MACD, Stochastic), volatility (Bollinger Bands, ATR), and more.

      **Plans:** All-In-One, EOD+Intraday — All World Extended.
      **Cost:** 5 API calls per request.
      **Docs:** https://eodhd.com/financial-apis/technical-indicators-api/
    endpoints:
      - path: "/technical/{ticker}"
        variants:
          - name: "SMA — AAPL.US (50-day)"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              function: "sma"
              period: "50"
              from: "2024-01-01"
              fmt: "json"
          - name: "RSI — AAPL.US (14-day)"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              function: "rsi"
              period: "14"
              from: "2024-01-01"
              fmt: "json"
          - name: "MACD — AAPL.US"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              function: "macd"
              from: "2024-01-01"
              fmt: "json"

  - name: "Stock Market Screener"
    description: >
      Filter stocks based on market capitalization, sector, dividend yield, technical signals,
      and other criteria. Supports complex financial screening with integrated real-time data.

      **Plans:** All-In-One, EOD+Intraday (limited free access).
      **Cost:** 5 API calls per request.
      **Docs:** https://eodhd.com/financial-apis/stock-market-screener-api/
    endpoints:
      - path: "/screener"
        variants:
          - name: "Screener — Large Cap Technology"
            query_overrides:
              sort: "market_capitalization.desc"
              limit: "10"
              filters: '[["market_capitalization",">",1000000000],["sector","=","Technology"]]'
              signals: "200d_new_hi"
          - name: "Screener — High Dividend Yield"
            query_overrides:
              sort: "market_capitalization.desc"
              limit: "10"

  - name: "Delisted Stock Companies"
    description: >
      Access data for delisted companies via existing APIs (Fundamental, Dividends, EOD, Intraday).
      Companies delisted after 2018 have the most comprehensive data.
      Uses the Exchange Symbol List endpoint with `delisted=1` parameter.

      **Plans:** Uses existing plan entitlements — no separate subscription required.
      **Docs:** https://eodhd.com/financial-apis/delisted-stock-companies-data/
    endpoints:
      - path: "/exchange-symbol-list/{exchangeCode}"
        variants:
          - name: "Delisted Tickers — US"
            path_params:
              exchangeCode: "US"
            query_overrides:
              delisted: "1"
              fmt: "json"
          - name: "Delisted Tickers — LSE"
            path_params:
              exchangeCode: "LSE"
            query_overrides:
              delisted: "1"
              fmt: "json"

  # ──────────────────────────────────────────────
  # FUNDAMENTAL & ECONOMIC DATA
  # ──────────────────────────────────────────────

  - name: "Fundamental Data: Stocks, ETFs, Mutual Funds, Indices"
    description: >
      Comprehensive fundamental data covering 70+ exchanges: financial statements (Income Statement,
      Balance Sheet, Cash Flow), earnings, valuation metrics, ESG scores, and more.
      Historical data spans 30+ years. Supports Stocks, ETFs, Mutual Funds, Indices, and Crypto.

      **Plans:** All-In-One, Fundamentals Data Feed.
      **Cost:** 10 API calls per request.
      **Demo tickers (free):** AAPL.US, TSLA.US, VTI.US, AMZN.US, BTC-USD.CC, EURUSD.FOREX.
      **Docs:** https://eodhd.com/financial-apis/stock-etfs-fundamental-data-feeds/
    endpoints:
      - path: "/fundamentals/{ticker}"
        variants:
          - name: "Fundamentals — AAPL.US (Income Statement, Annual)"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              filter: "Financials::Income_Statement::annual"
          - name: "Fundamentals — AAPL.US (Balance Sheet, Quarterly)"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              filter: "Financials::Balance_Sheet::quarterly"
      - path: "/v1.1/fundamentals/{ticker}"
        variants:
          - name: "Fundamentals v1.1 — AAPL.US (Earnings Trend)"
            path_params:
              ticker: "AAPL.US"
            query_overrides:
              filter: "Earnings::Trend"

  - name: "Bulk Fundamentals"
    description: >
      Retrieve fundamental data for hundreds of companies in a single request across 70+ exchanges.
      Supports pagination (offset/limit) and symbol filtering. Stocks only — ETFs and mutual funds excluded.

      **Plans:** Fundamentals Data Feed Extended only (not self-service — requires contacting support@eodhistoricaldata.com).
      **Cost:** 100 API calls per bulk request. Max 500 symbols per request.
      **Docs:** https://eodhd.com/financial-apis/bulk-fundamentals-api/
    endpoints:
      - path: "/bulk-fundamentals/{EXCHANGE}"
        variants:
          - name: "Bulk Fundamentals — US Exchange"
            path_params:
              EXCHANGE: "US"
            query_overrides:
              symbols: "AAPL,MSFT,GOOGL"
              limit: "10"
              fmt: "json"
      - path: "/v1.1/bulk-fundamentals/{EXCHANGE}"
        variants:
          - name: "Bulk Fundamentals v1.1 — US Exchange"
            path_params:
              EXCHANGE: "US"
            query_overrides:
              symbols: "AAPL,MSFT"
              limit: "10"
              fmt: "json"

  - name: "Calendar: Earnings, IPOs, Dividends, Splits, Trends"
    description: >
      Financial calendar data — upcoming and historical earnings dates, IPOs, stock splits,
      dividends, and analyst earnings trends. Key resource for event-driven trading strategies.

      **Plans:** All-In-One, Fundamentals Data Feed, Financial Events (Calendar) & News Feed.
      **Cost:** 1 API call per request.
      **Docs:** https://eodhd.com/financial-apis/calendar-upcoming-earnings-ipos-and-splits/
    endpoints:
      - path: "/calendar/earnings"
        variants:
          - name: "Earnings Calendar"
            query_overrides:
              fmt: "json"
      - path: "/calendar/ipos"
        variants:
          - name: "IPO Calendar"
            query_overrides:
              fmt: "json"
      - path: "/calendar/dividends"
        variants:
          - name: "Dividends Calendar"
            query_overrides:
              fmt: "json"
      - path: "/calendar/splits"
        variants:
          - name: "Splits Calendar"
            query_overrides:
              fmt: "json"
      - path: "/calendar/trends"
        variants:
          - name: "Earnings Trends — AAPL.US, MSFT.US"
            query_overrides:
              symbols: "AAPL.US,MSFT.US"
              fmt: "json"

  - name: "Insider Transactions (SEC Form 4)"
    description: >
      SEC Form 4 filing data for all US companies — insider buys and sells by company officers,
      directors, and major shareholders. Supports filtering by ticker, date range, and result limit.

      **Plans:** All-In-One, Fundamentals Data Feed.
      **Cost:** 10 API calls per request.
      **Docs:** https://eodhd.com/financial-apis/insider-transactions-api/
    endpoints:
      - path: "/insider-transactions"
        variants:
          - name: "Insider Transactions — All"
            query_overrides:
              limit: "10"
              fmt: "json"
          - name: "Insider Transactions — AAPL.US"
            query_overrides:
              code: "AAPL.US"
              limit: "10"
              fmt: "json"

