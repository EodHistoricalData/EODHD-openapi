  - name: "Financial News & Sentiment Data"
    description: >
      Financial news aggregated from major portals with in-house sentiment analysis.
      Three endpoints: news articles feed, daily sentiment scores per ticker, and weighted keyword analysis.
      Covers stocks, ETFs, forex, and cryptocurrencies.

      **Plans:** Free (20 calls/day), standalone News API, All-In-One, EOD Historical Data, EOD+Intraday, Fundamentals Data Feed.
      **Cost:** 5 API calls per request + 5 per ticker queried.
      **Docs:** https://eodhd.com/financial-apis/financial-news-api/
    endpoints:
      - path: "/news"
        variants:
          - name: "News — AAPL.US"
            query_overrides:
              s: "AAPL.US"
              limit: "10"
              fmt: "json"
          - name: "News — By Topic"
            query_overrides:
              t: "earnings"
              limit: "10"
              fmt: "json"
      - path: "/sentiments"
        variants:
          - name: "News Sentiment — AAPL.US, BTC-USD.CC"
            query_overrides:
              s: "AAPL.US,BTC-USD.CC"
              from: "2024-01-01"
              fmt: "json"
      - path: "/news-word-weights"
        variants:
          - name: "News Word Weights — AAPL"
            query_overrides:
              s: "AAPL"
              fmt: "json"

  - name: "Economic Events Data"
    description: >
      Historical and forecasted economic events — retail sales, bond auctions, PMI releases,
      and more from countries worldwide. Data available from 2020 onward.
      Supports filtering by date, country (ISO 3166-1 alpha-2), and event type.

      **Plans:** All-In-One, Fundamentals Data Feed.
      **Cost:** 1 API call per request.
      **Docs:** https://eodhd.com/financial-apis/economic-events-data-api/
    endpoints:
      - path: "/economic-events"
        variants:
          - name: "Economic Events — US"
            query_overrides:
              country: "US"
              limit: "10"
          - name: "Economic Events — All Countries"
            query_overrides:
              limit: "10"

  - name: "Macro Indicators"
    description: >
      30+ macroeconomic indicators — GDP, unemployment, inflation, international trade, and more
      for national and global economies. Historical coverage extends back to 1960.

      **Plans:** All-In-One, Fundamentals Data Feed.
      **Cost:** 10 API calls per request.
      **Docs:** https://eodhd.com/financial-apis/macroeconomics-data-and-macro-indicators-api/
    endpoints:
      - path: "/macro-indicator/{country}"
        variants:
          - name: "Macro Indicator — USA (GDP)"
            path_params:
              country: "USA"
            query_overrides:
              indicator: "gdp_current_usd"
              fmt: "json"
          - name: "Macro Indicator — USA (Inflation)"
            path_params:
              country: "USA"
            query_overrides:
              indicator: "inflation_consumer_prices_annual"
              fmt: "json"

  - name: "Macroeconomic Data: Bonds, LIBOR, EURIBOR, ECB Rates"
    description: >
      Government bond yields for 15+ countries, LIBOR/EURIBOR rates, and central bank exchange rates
      (ECB, Norges Bank). Uses the standard EOD endpoint with special exchange suffixes (.GBOND, .MONEY).
      5+ years of daily historical data.

      **Plans:** All-In-One, Fundamentals Data Feed.
      **Cost:** 1 API call per request.
      **Docs:** https://eodhd.com/financial-apis/macroeconomic-data-api/
    endpoints:
      - path: "/eod/{ticker}"
        variants:
          - name: "10Y US Treasury Bond"
            path_params:
              ticker: "US10Y.GBOND"
            query_overrides:
              fmt: "json"
              from: "2024-01-01"
          - name: "EURIBOR 3-Month"
            path_params:
              ticker: "EURIBOR3M.MONEY"
            query_overrides:
              fmt: "json"
              from: "2024-01-01"
          - name: "LIBOR USD 3-Month"
            path_params:
              ticker: "LIBOR3M.MONEY"
            query_overrides:
              fmt: "json"
              from: "2024-01-01"
          - name: "ECB Deposit Rate"
            path_params:
              ticker: "ECBDFR.MONEY"
            query_overrides:
              fmt: "json"
              from: "2024-01-01"
          - name: "Norway 10Y Government Bond"
            path_params:
              ticker: "GVNB10YR.BOND"
            query_overrides:
              fmt: "json"
              from: "2024-01-01"

  - name: "Bonds Fundamentals"
    description: >
      Static fundamental data for US corporate and government bonds — coupon, maturity date,
