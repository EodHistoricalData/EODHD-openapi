PraamsExploreBondResponse:
  type: object
  description: Response from the PRAAMS bond screener endpoint.
  properties:
    success:
      type: boolean
      description: true if the request succeeded
    message:
      type: string
      description: Status message (empty on success)
    errors:
      type: array
      description: Error objects (empty on success)
      items:
        type: object
        properties:
          code:
            type: string
            description: Error code
          description:
            type: string
            description: Detailed error description
    item:
      type: [object, "null"]
      description: The main data payload
      properties:
        peers:
          type: array
          description: Array of matching bond records
          items:
            type: object
            properties:
              assetInfo:
                type: object
                description: Asset identification information
                properties:
                  assetId:
                    type: integer
                    description: Internal PRAAMS asset ID
                  ratio:
                    type: integer
                    description: PRAAMS Ratio (1-10 scale)
                  watchList:
                    type: boolean
                    description: Watchlist flag
                  isBond:
                    type: boolean
                    description: Always true for bond screener
                  bondType:
                    type: string
                    description: Bond classification (e.g. Corporate)
                  isFinancial:
                    type: boolean
                    description: Whether the issuer is in the financial sector
                  ticker:
                    type: string
                    description: Bond description (e.g. ACA.PA 1.3% 08-Feb-27)
                  name:
                    type: string
                    description: Issuer name
                  isin:
                    type: string
                    description: ISIN identifier
                  companyDescription:
                    type: string
                    description: Issuer description
                  isActivelyTrading:
                    type: boolean
                    description: Whether the bond is currently trading
              riskWatch:
                type: string
                description: Overall risk characterization
              returnWatch:
                type: string
                description: Overall return characterization
              amountOutstanding:
                type: integer
                description: Amount outstanding category
              marketView:
                type: integer
                description: Market view score (bond-specific)
              coupon:
                type: integer
                description: Coupon score (bond-specific)
              valuation:
                type: integer
                description: Valuation score
              performance:
                type: integer
                description: Performance score
              profitability:
                type: integer
                description: Issuer profitability score
              growthMom:
                type: integer
                description: Issuer growth momentum score
              other:
                type: integer
                description: Other risks score
              countryRisk:
                type: integer
                description: Country risk score
              liquidity:
                type: integer
                description: Liquidity risk score
              stressTest:
                type: integer
                description: Stress test score
              volatility:
                type: integer
                description: Volatility score
              solvency:
                type: integer
                description: Solvency or default risk score
        totalCount:
          type: integer
          description: Total number of matching bonds (for pagination)
