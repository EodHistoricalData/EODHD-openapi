/search/{query}:
  get:
    summary: Search stocks, companies, and ISINs
    description: Search for stocks, companies, or ISINs by a query (e.g., company
      name, stock symbol, or ISIN)
    operationId: SearchStocksByQuery
    parameters:
    - name: query
      in: path
      required: true
      description: The search query (e.g., 'AAPL', 'Amazon', or ISIN 'US3453708600')
      schema:
        type: string
    - name: api_token
      in: query
      required: true
      description: API token for authentication
      schema:
        type: string
    - name: fmt
      in: query
      required: false
      description: Response format (e.g., 'json')
      schema:
        type: string
        enum:
        - json
        - xml
    - name: limit
      in: query
      required: false
      description: Limit the number of results returned
      schema:
        type: integer
        example: 1
    responses:
      '200':
        description: Successful response with search results
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  Code:
                    type: string
                  Exchange:
                    type: string
                  Name:
                    type: string
                  Type:
                    type: string
                  Country:
                    type: string
                  Currency:
                    type: string
                  ISIN:
                    type: [string, "null"]
                  previousClose:
                    type: number
                  previousCloseDate:
                    type: string
                    format: date
            example:
            - Code: AAPL
              Exchange: US
              Name: Apple Inc
              Type: Common Stock
              Country: USA
              Currency: USD
              ISIN: US0378331005
              previousClose: 230.76
              previousCloseDate: '2024-10-23'
            - Code: AMZN
              Exchange: US
              Name: Amazon.com Inc
              Type: Common Stock
              Country: USA
              Currency: USD
              ISIN: US0231351067
              previousClose: 184.71
              previousCloseDate: '2024-10-23'
      '400':
        description: Invalid request parameters
      '401':
        description: Unauthorized
      '404':
        description: No results found
    tags:
    - Screening
