/mp/investverte/country/{symbol}:
  get:
    summary: Get ESG country details
    description: Returns detailed ESG scores and metrics for a specific country from Investverte.
    operationId: GetESGCountryDetails
    parameters:
    - name: symbol
      in: path
      required: true
      description: Country code (e.g., 'US', 'GB', 'DE').
      schema:
        type: string
    - name: api_token
      in: query
      required: true
      description: API token for authentication.
      schema:
        type: string
    - name: fmt
      in: query
      required: false
      description: Output format.
      schema:
        type: string
        enum:
        - json
        default: json
    responses:
      '200':
        description: Successfully retrieved country ESG details.
        content:
          application/json:
            schema:
              type: object
              properties:
                country:
                  type: string
                  description: Country name.
                country_code:
                  type: string
                  description: ISO country code.
                esg_score:
                  type: number
                  description: Overall ESG score.
                environmental_score:
                  type: number
                  description: Environmental pillar score.
                social_score:
                  type: number
                  description: Social pillar score.
                governance_score:
                  type: number
                  description: Governance pillar score.
                top_companies:
                  type: array
                  description: Top ESG-rated companies in this country.
                  items:
                    type: object
                    properties:
                      symbol:
                        type: string
                      name:
                        type: string
                      esg_score:
                        type: number
                sector_breakdown:
                  type: array
                  description: ESG scores by sector within this country.
                  items:
                    type: object
                    properties:
                      sector:
                        type: string
                      avg_esg_score:
                        type: number
                      num_companies:
                        type: integer
      '401':
        description: Unauthorized. Invalid API token.
      '404':
        description: Country not found.
    tags:
    - ESG
