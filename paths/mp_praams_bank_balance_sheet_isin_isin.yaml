/mp/praams/bank/balance_sheet/isin/{isin}:
  get:
    summary: Get bank balance sheet by ISIN
    description: Returns bank-specific balance sheet analysis for the specified ISIN from PRAAMS.
    operationId: GetPRAAMSBankBalanceSheetByISIN
    parameters:
    - name: isin
      in: path
      required: true
      description: ISIN code (e.g., 'US46625H1005').
      schema:
        type: string
    - name: api_token
      in: query
      required: true
      description: API token for authentication.
      schema:
        type: string
    - name: fmt
      in: query
      required: false
      description: Output format.
      schema:
        type: string
        enum:
        - json
        default: json
    responses:
      '200':
        description: Successfully retrieved bank balance sheet.
        content:
          application/json:
            schema:
              type: object
              properties:
                isin:
                  type: string
                name:
                  type: string
                  description: Bank name.
                total_assets:
                  type: number
                total_liabilities:
                  type: number
                total_equity:
                  type: number
                loans_net:
                  type: number
                deposits:
                  type: number
                tier1_capital_ratio:
                  type: number
                leverage_ratio:
                  type: number
                periods:
                  type: array
                  items:
                    type: object
                    properties:
                      date:
                        type: string
                        format: date
                      total_assets:
                        type: number
                      total_liabilities:
                        type: number
                      total_equity:
                        type: number
      '401':
        description: Unauthorized. Invalid API token.
      '404':
        description: Bank data not found.
    tags:
    - Investment Analytics
