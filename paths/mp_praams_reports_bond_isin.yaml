/mp/praams/reports/bond/{isin}:
  get:
    summary: Get bond report by ISIN
    description: Returns a comprehensive PRAAMS report for a specific bond, including risk assessment and analytics.
    operationId: GetPRAAMSBondReport
    parameters:
    - name: isin
      in: path
      required: true
      description: Bond ISIN code.
      schema:
        type: string
    - name: api_token
      in: query
      required: true
      description: API token for authentication.
      schema:
        type: string
    - name: fmt
      in: query
      required: false
      description: Output format.
      schema:
        type: string
        enum:
        - json
        default: json
    responses:
      '200':
        description: Successfully retrieved bond report.
        content:
          application/json:
            schema:
              type: object
              properties:
                isin:
                  type: string
                name:
                  type: string
                report_date:
                  type: string
                  format: date
                risk_summary:
                  type: object
                  properties:
                    risk_score:
                      type: number
                    risk_category:
                      type: string
                    credit_risk:
                      type: string
                    interest_rate_risk:
                      type: string
                bond_details:
                  type: object
                  properties:
                    coupon_rate:
                      type: number
                    maturity_date:
                      type: string
                      format: date
                    yield_to_maturity:
                      type: number
                    duration:
                      type: number
                    convexity:
                      type: number
                    issuer:
                      type: string
                    credit_rating:
                      type: string
      '401':
        description: Unauthorized. Invalid API token.
      '404':
        description: Bond not found.
    tags:
    - Investment Analytics
