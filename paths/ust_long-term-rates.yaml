/ust/long-term-rates:
  get:
    summary: Get US Treasury long-term rates
    description: Returns US Treasury long-term average rates and extrapolation factors for maturities beyond 30 years.
    operationId: GetUSTLongTermRates
    parameters:
    - name: api_token
      in: query
      required: true
      description: API token for authentication.
      schema:
        type: string
    - name: from
      in: query
      required: false
      description: Start date in 'YYYY-MM-DD' format.
      schema:
        type: string
        format: date
    - name: to
      in: query
      required: false
      description: End date in 'YYYY-MM-DD' format.
      schema:
        type: string
        format: date
    - name: fmt
      in: query
      required: false
      description: Output format.
      schema:
        type: string
        enum:
        - json
        - csv
        default: json
    responses:
      '200':
        description: Successfully retrieved long-term rates.
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                    description: Date of the rate.
                  lt_composite_gt_10:
                    type: number
                    description: Long-term composite rate (over 10 years).
                  treasury_20_year_cmt:
                    type: number
                    description: Treasury 20-year constant maturity rate.
                  extrapolation_factor:
                    type: number
                    description: Extrapolation factor.
      '401':
        description: Unauthorized. Invalid API token.
      '404':
        description: Data not found for specified date range.
    tags:
    - US Treasury
