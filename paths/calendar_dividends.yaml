/calendar/dividends:
  get:
    summary: Retrieve upcoming dividends calendar
    description: |
      Look up upcoming and historical dividend events.

      Uses the JSON:API filter/page convention. **At least one of `filter[date_eq]` or `filter[symbol]` is required** — a request without either will return HTTP 422.
    operationId: GetUpcomingDividends
    parameters:
    - name: api_token
      in: query
      required: true
      description: Your API token for accessing the API.
      schema:
        type: string
    - name: filter[date_eq]
      in: query
      required: false
      description: |
        Exact date in 'YYYY-MM-DD' format. Required if `filter[symbol]` is not present.
      schema:
        type: string
        format: date
    - name: filter[date_from]
      in: query
      required: false
      description: Start date in 'YYYY-MM-DD' format.
      schema:
        type: string
        format: date
    - name: filter[date_to]
      in: query
      required: false
      description: End date in 'YYYY-MM-DD' format.
      schema:
        type: string
        format: date
    - name: filter[symbol]
      in: query
      required: false
      description: |
        Ticker symbol (e.g., 'AAPL.US'). When provided, `filter[date_eq]` may be omitted.
      schema:
        type: string
    - name: page[limit]
      in: query
      required: false
      description: Number of records per page (1-10000).
      schema:
        type: integer
        minimum: 1
        maximum: 10000
    - name: page[offset]
      in: query
      required: false
      description: Pagination offset (0-1000000).
      schema:
        type: integer
        minimum: 0
        maximum: 1000000
    - name: fmt
      in: query
      required: false
      description: Output format. Defaults to 'json'.
      schema:
        type: string
        enum:
        - csv
        - json
        default: json
    responses:
      '200':
        description: Successfully retrieved dividends calendar data.
        content:
          application/json:
            schema:
              type: object
              properties:
                meta:
                  type: object
                  description: Pagination and request metadata.
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      date:
                        type: string
                        format: date
                        description: Dividend ex-date.
                      symbol:
                        type: string
                        description: Ticker symbol.
                    required:
                    - date
                    - symbol
                links:
                  type: object
                  description: JSON:API pagination links.
              required:
              - data
            example:
              meta:
                total: 91
              data:
              - date: '2026-05-11'
                symbol: AAPL.US
              - date: '2026-05-12'
                symbol: MSFT.US
              links:
                self: https://eodhd.com/api/calendar/dividends?filter[symbol]=AAPL.US
      '401':
        description: Unauthorized. Invalid API token.
      '422':
        description: |
          Validation error. Returned when required filter is missing or parameters are malformed.
        content:
          application/json:
            schema:
              type: object
              properties:
                errors:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: string
            example:
              errors:
                filter:
                - The filter field is required.
                filter.date_eq:
                - The filter.date eq field is required when filter.symbol is not present.
    tags:
    - Calendar
