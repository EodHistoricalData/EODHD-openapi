/news:
  get:
    summary: Retrieve financial news articles
    description: Retrieve financial news articles for a specific company ticker or
      topic
    operationId: GetFinancialNews
    parameters:
    - name: s
      in: query
      required: false
      description: Ticker code to get news for (e.g., 'AAPL.US'). Required if 't'
        is not provided.
      schema:
        type: string
    - name: t
      in: query
      required: false
      description: Tag to get news on a given topic. Required if 's' is not provided.
      schema:
        type: string
    - name: api_token
      in: query
      required: true
      description: API token for authentication
      schema:
        type: string
    - name: from
      in: query
      required: false
      description: Start date for news data (YYYY-MM-DD)
      schema:
        type: string
        format: date
    - name: to
      in: query
      required: false
      description: End date for news data (YYYY-MM-DD)
      schema:
        type: string
        format: date
    - name: limit
      in: query
      required: false
      description: The number of results to return
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 1000
    - name: offset
      in: query
      required: false
      description: The offset of the data
      schema:
        type: integer
        default: 0
        minimum: 0
    - name: fmt
      in: query
      required: false
      description: Response format (e.g., 'json')
      schema:
        type: string
        enum:
        - json
    responses:
      '200':
        description: Successful response with financial news articles
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date-time
                  title:
                    type: string
                  content:
                    type: string
                  link:
                    type: string
                    format: uri
                  symbols:
                    type: array
                    items:
                      type: string
                  tags:
                    type: array
                    items:
                      type: string
                  sentiment:
                    type: object
                    properties:
                      polarity:
                        type: number
                      neg:
                        type: number
                      neu:
                        type: number
                      pos:
                        type: number
            example:
            - date: '2024-06-05T20:35:00+00:00'
              title: Usher and Apple CEO Tim Cook had a meeting...
              content: Usher has some suggestions for Apple CEO Tim Cook...
              link: https://finance.yahoo.com/news/usher-apple-ceo-tim-cook-203500033.html
              symbols:
              - AAPL.US
              tags: []
              sentiment:
                polarity: 0.997
                neg: 0.024
                neu: 0.871
                pos: 0.105
            - date: '2024-06-05T20:33:57+00:00'
              title: 'The 2030''s Millionaire Club: 3 Hyper-Growth Stocks to Buy Now'
              content: Hyper-growth stocks offer excitement...
              link: https://finance.yahoo.com/news/2030-millionaire-club-3-hyper-203357155.html
              symbols:
              - AAPL.US
              - NVDA.US
              - PLTR.US
              tags: []
              sentiment:
                polarity: 1
                neg: 0.018
                neu: 0.781
                pos: 0.202
      '400':
        description: Invalid request parameters
      '401':
        description: Unauthorized
      '404':
        description: No news articles found
    tags:
    - News
