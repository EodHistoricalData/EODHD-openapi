/mp/tradinghours/markets:
  get:
    summary: List all markets
    description: Returns a list of all available markets with their basic information including exchange codes, names, and countries.
    operationId: GetTradingHoursMarkets
    parameters:
    - name: api_token
      in: query
      required: true
      description: API token for authentication.
      schema:
        type: string
    - name: fmt
      in: query
      required: false
      description: Output format.
      schema:
        type: string
        enum:
        - json
        default: json
    responses:
      '200':
        description: Successfully retrieved markets list.
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  fin_id:
                    type: string
                    description: Unique financial identifier for the market.
                  exchange:
                    type: string
                    description: Exchange code.
                  market:
                    type: string
                    description: Market name.
                  products:
                    type: string
                    description: Products traded on the market.
                  country:
                    type: string
                    description: Country where the market is located.
                  country_code:
                    type: string
                    description: ISO country code.
      '401':
        description: Unauthorized. Invalid API token.
      '429':
        description: Too Many Requests.
    tags:
    - Trading Hours
