/mp/illio/chapters/performance/{id}:
  get:
    summary: Get performance analysis
    description: Returns performance analysis for the specified instrument, including cumulative returns over various periods.
    operationId: GetIllioPerformance
    parameters:
    - name: id
      in: path
      required: true
      description: Instrument identifier (e.g., 'AAPL.US').
      schema:
        type: string
    - name: api_token
      in: query
      required: true
      description: API token for authentication.
      schema:
        type: string
    - name: fmt
      in: query
      required: false
      description: Output format.
      schema:
        type: string
        enum:
        - json
        default: json
    responses:
      '200':
        description: Successfully retrieved performance data.
        content:
          application/json:
            schema:
              type: object
              properties:
                instrument:
                  type: string
                  description: Instrument identifier.
                returns:
                  type: object
                  properties:
                    1d:
                      type: number
                      description: 1-day return.
                    1w:
                      type: number
                      description: 1-week return.
                    1m:
                      type: number
                      description: 1-month return.
                    3m:
                      type: number
                      description: 3-month return.
                    6m:
                      type: number
                      description: 6-month return.
                    ytd:
                      type: number
                      description: Year-to-date return.
                    1y:
                      type: number
                      description: 1-year return.
                    3y:
                      type: number
                      description: 3-year return.
                    5y:
                      type: number
                      description: 5-year return.
                cumulative_series:
                  type: array
                  items:
                    type: object
                    properties:
                      date:
                        type: string
                        format: date
                      cumulative_return:
                        type: number
      '401':
        description: Unauthorized. Invalid API token.
      '404':
        description: Instrument not found.
    tags:
    - Risk Analytics
