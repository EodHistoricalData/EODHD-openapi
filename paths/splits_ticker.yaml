/splits/{ticker}:
  get:
    summary: Retrieve historical split data
    description: Fetches historical stock split data for a specified ticker, including
      split dates and ratios.
    operationId: GetHistoricalSplits
    parameters:
    - name: ticker
      in: path
      required: true
      description: Ticker symbol of the stock in the format {SYMBOL_NAME}.{EXCHANGE_ID}
        (e.g., 'AAPL.US' for NASDAQ or 'AAPL.MX' for the Mexican Stock Exchange).
      schema:
        type: string
    - name: api_token
      in: query
      required: true
      description: Your API key for authentication.
      schema:
        type: string
    - name: from
      in: query
      required: false
      description: Start date for data retrieval in 'YYYY-MM-DD' format. Defaults
        to earliest available data if not provided.
      schema:
        type: string
        format: date
    - name: to
      in: query
      required: false
      description: End date for data retrieval in 'YYYY-MM-DD' format. Defaults to
        latest available data if not provided.
      schema:
        type: string
        format: date
    - name: fmt
      in: query
      required: false
      description: Output format, either 'json' or 'csv'. Defaults to 'json'.
      schema:
        type: string
        enum:
        - json
        - csv
        default: json
    responses:
      '200':
        description: Successfully retrieved historical split data.
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date
                    description: Date of the stock split.
                  split:
                    type: string
                    description: Split ratio represented as '{new shares}/{old shares}'
                      (e.g., '2.000000/1.000000').
                required:
                - date
                - split
            example:
            - date: '2000-06-21'
              split: 2.000000/1.000000
            - date: '2005-02-28'
              split: 2.000000/1.000000
            - date: '2014-06-09'
              split: 7.000000/1.000000
            - date: '2020-08-31'
              split: 4.000000/1.000000
      '400':
        description: Invalid request parameters.
      '401':
        description: Unauthorized. Invalid API token.
      '404':
        description: Split data not found for the specified ticker or date range.
    tags:
    - Dividends & Splits
