          application/json:
            schema:
              $ref: ../components/schemas/Error.yaml#/Error
      '404':
        description: Not Found
        content:
          application/json:
            schema:
              $ref: ../components/schemas/Error.yaml#/Error
      '422':
        description: Unprocessable Entity
        content:
          application/json:
            schema:
              $ref: ../components/schemas/Error.yaml#/Error
