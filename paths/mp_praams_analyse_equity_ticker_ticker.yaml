/mp/praams/analyse/equity/ticker/{ticker}:
  get:
    summary: Analyse equity by ticker
    description: Returns PRAAMS risk scoring and analysis for a specific equity identified by ticker.
    operationId: AnalysePRAAMSEquityByTicker
    parameters:
    - name: ticker
      in: path
      required: true
      description: Ticker symbol (e.g., 'AAPL.US').
      schema:
        type: string
    - name: api_token
      in: query
      required: true
      description: API token for authentication.
      schema:
        type: string
    - name: fmt
      in: query
      required: false
      description: Output format.
      schema:
        type: string
        enum:
        - json
        default: json
    responses:
      '200':
        description: Successfully retrieved equity analysis.
        content:
          application/json:
            schema:
              type: object
              properties:
                ticker:
                  type: string
                name:
                  type: string
                risk_score:
                  type: number
                  description: PRAAMS risk score.
                risk_category:
                  type: string
                  description: Risk category.
                volatility:
                  type: number
                beta:
                  type: number
                sharpe_ratio:
                  type: number
                max_drawdown:
                  type: number
                sector:
                  type: string
                market_cap:
                  type: number
      '401':
        description: Unauthorized. Invalid API token.
      '404':
        description: Equity not found.
    tags:
    - Investment Analytics
