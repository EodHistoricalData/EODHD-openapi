/mp/illio/chapters/risk/{id}:
  get:
    summary: Get risk analysis
    description: Returns risk analysis for the specified instrument, including drawdown, VaR, and risk-adjusted return metrics.
    operationId: GetIllioRisk
    parameters:
    - name: id
      in: path
      required: true
      description: Instrument identifier (e.g., 'AAPL.US').
      schema:
        type: string
    - name: api_token
      in: query
      required: true
      description: API token for authentication.
      schema:
        type: string
    - name: fmt
      in: query
      required: false
      description: Output format.
      schema:
        type: string
        enum:
        - json
        default: json
    responses:
      '200':
        description: Successfully retrieved risk data.
        content:
          application/json:
            schema:
              type: object
              properties:
                instrument:
                  type: string
                  description: Instrument identifier.
                max_drawdown:
                  type: number
                  description: Maximum drawdown percentage.
                sharpe_ratio:
                  type: number
                  description: Sharpe ratio.
                sortino_ratio:
                  type: number
                  description: Sortino ratio.
                var_95:
                  type: number
                  description: Value at Risk at 95% confidence.
                var_99:
                  type: number
                  description: Value at Risk at 99% confidence.
                drawdown_series:
                  type: array
                  items:
                    type: object
                    properties:
                      date:
                        type: string
                        format: date
                      drawdown:
                        type: number
                        description: Drawdown value.
      '401':
        description: Unauthorized. Invalid API token.
      '404':
        description: Instrument not found.
    tags:
    - Risk Analytics
