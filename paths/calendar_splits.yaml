/calendar/splits:
  get:
    summary: Retrieve upcoming and historical stock splits
    description: Fetches information on stock splits for specified date ranges.
    operationId: GetUpcomingSplits
    parameters:
    - name: api_token
      in: query
      required: true
      description: Your API key for authentication.
      schema:
        type: string
    - name: from
      in: query
      required: false
      description: Start date for split data in 'YYYY-MM-DD' format. Defaults to today
        if not provided.
      schema:
        type: string
        format: date
    - name: to
      in: query
      required: false
      description: End date for split data in 'YYYY-MM-DD' format. Defaults to 7 days
        from today if not provided.
      schema:
        type: string
        format: date
    - name: fmt
      in: query
      required: false
      description: Output format, either 'csv' or 'json'. Default is 'csv'.
      schema:
        type: string
        enum:
        - csv
        - json
        default: csv
    responses:
      '200':
        description: Successfully retrieved split data.
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: Response type, here 'Splits'.
                description:
                  type: string
                  description: Description of the response data.
                from:
                  type: string
                  format: date
                  description: The start date for the split data.
                to:
                  type: string
                  format: date
                  description: The end date for the split data.
                splits:
                  type: array
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                        description: Ticker symbol of the stock undergoing the split.
                      split_date:
                        type: string
                        format: date
                        description: The date when the stock split takes effect.
                      optionable:
                        type: string
                        enum:
                        - Y
                        - N
                        description: Indicates if the stock is optionable ('Y' for
                          yes, 'N' for no).
                      old_shares:
                        type: integer
                        description: The number of shares before the split.
                      new_shares:
                        type: integer
                        description: The number of shares after the split.
                    required:
                    - code
                    - split_date
                    - old_shares
                    - new_shares
              example:
                type: Splits
                description: Historical and upcoming splits
                from: '2018-12-02'
                to: '2018-12-06'
                splits:
                - code: AINV.US
                  split_date: '2018-12-03'
                  optionable: N
                  old_shares: 3
                  new_shares: 1
                - code: SDV.AU
                  split_date: '2018-12-03'
                  optionable: N
                  old_shares: 10
                  new_shares: 1
                - code: 1604.TW
                  split_date: '2018-12-04'
                  optionable: N
                  old_shares: 1000
                  new_shares: 800
      '400':
        description: Invalid request parameters.
      '401':
        description: Unauthorized. Invalid API token.
      '404':
        description: No split data found for the specified date range.
    tags:
    - Calendar
