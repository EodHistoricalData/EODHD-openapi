<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EODHD API Reference — Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    html { box-sizing: border-box; overflow-y: scroll; }
    *, *::before, *::after { box-sizing: inherit; }
    body { margin: 0; background: #fafafa; }
    .topbar-wrapper img { content: url('https://eodhd.com/img/EODHD_logo.svg'); height: 40px; }
    .swagger-ui .topbar { background-color: #1b1b3a; padding: 8px 0; }
    .swagger-ui .info hgroup.main a { display: none; }
    .nav-links { text-align: center; padding: 12px; background: #f0f0f0; border-bottom: 1px solid #ddd; }
    .nav-links a { margin: 0 12px; color: #1b1b3a; text-decoration: none; font-family: sans-serif; font-size: 14px; }
    .nav-links a.active { font-weight: bold; border-bottom: 2px solid #1b1b3a; }
  </style>
</head>
<body>
  <div class="nav-links">
    <a href="index.html" class="active">Swagger UI</a>
    <a href="redoc.html">Redoc</a>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: "openapi.yaml",
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset
      ],
      layout: "BaseLayout",
      defaultModelsExpandDepth: 1,
      docExpansion: "list",
      filter: true,
      tryItOutEnabled: false
    });
  </script>
</body>
</html>
